name: Monthly Scheme Sync

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraper
        run: python scrape_myscheme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "SchemeBot"
          git config --global user.email "bot@github.com"
          # Check if there are any changes in the data directory
          git add data/
          if git diff --cached --quiet; then
            echo "No changes found. Skipping commit."
          else
            git commit -m "Auto-update schemes: $(date +'%Y-%m-%d')"
            git push
          fi
